name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 06:17 UTC. Catches advisories newly disclosed against
    # dependencies that are already committed (no code change required).
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.13
          cache: true

      - name: Install dependencies
        run: deno install

      - name: Audit dependencies
        run: deno audit
        # Soft-fail for now: a known high-severity advisory in drizzle-orm
        # (CVE-2026-39356, SQL injection) is pending a major-version bump that is
        # tracked as a follow-up. Once drizzle-orm is on >= 0.45.2:
        #   - switch this to `deno audit --level=high`
        #   - remove continue-on-error
        #   - add the "dependency audit" check to main branch protection
        continue-on-error: true
