name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 06:17 UTC. Catches advisories newly disclosed against
    # dependencies that are already committed (no code change required).
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.13
          cache: true

      - name: Install dependencies
        run: deno install

      - name: Audit dependencies
        # Hard gate on high/critical advisories. Moderate/low (e.g. the dev-only
        # esbuild advisory pulled transitively by drizzle-kit) are reported by the
        # scheduled run but do not block merges. --ignore-registry-errors keeps a
        # transient advisory-DB outage from failing the required check.
        run: deno audit --level=high --ignore-registry-errors
