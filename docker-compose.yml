services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports: ['${MYSQL_PORT:-3306}:3306']
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uapp', '-papp']
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    profiles: ['redis']
    ports: ['${REDIS_PORT:-6379}:6379']
